<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro新手教程</title>
    <link rel="icon" href="img/Pro.png" type="image/png">
    
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="index-css.css">

</head>
<body>



    <!-- 左侧导航栏 -->
    <nav id="sidebar" class="collapsed">
        <div class="toggle-btn" onclick="toggleSidebar()">
            <img src="img/menu.png" alt="展开/收缩菜单">
        </div>        
        <a href="#" onclick="loadContent('buying.html', 'Pro购买方法')" id="nav-buying" class="active">
            <img src="img/buying.png" alt="购买图标"><span>购买</span>
        </a>
        <a href="#" onclick="loadContent('use.html', 'Pro使用方法')" id="nav-use">
            <img src="img/use.png" alt="使用图标"><span>使用</span>
        </a>
        <a href="#" onclick="loadContent('issues.html', 'Pro常见问题')" id="nav-issues">
            <img src="img/issues.png" alt="常见问题图标"><span>常见问题</span>
        </a>
        <a href="#" onclick="loadContent('contact.html', '联系我们')" id="nav-contact">
            <img src="img/contact.png" alt="联系我们图标"><span>联系我们</span>
        </a>
    </nav>

    <!-- 右侧内容显示区域 -->
    <main>
        <!-- 子标题栏 -->
        <div class="sub-header" id="subHeader">Pro购买方法</div>

        <div id="content" class="content">
            <!-- 默认加载 buying.html 文件内容 -->
        </div>
    </main>

    <!-- 顶部标题栏 -->
    <header>
        <h1>Pro新手教程</h1>
    </header>

    <!-- 底部栏 -->
    <footer>
        Copyright © 2024 AMtttt
    </footer>

    <!-- JavaScript 用于动态内容切换和导航栏收缩 -->
    <script>
        // 页面加载时默认加载buying.html
        document.addEventListener("DOMContentLoaded", function() {
            loadContent('buying.html', 'Pro购买方法');
        });

        // 动态加载内容文件
        function loadContent(file, title) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', file, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    document.getElementById('content').innerHTML = xhr.responseText;
                    document.getElementById('subHeader').textContent = title;

                    // 移除其他导航项的 active 类
                    var links = document.querySelectorAll('nav a');
                    links.forEach(function (link) {
                        link.classList.remove('active');
                    });

                    // 给当前导航项添加 active 类
                    var currentLink = document.querySelector('nav a[onclick="loadContent(\'' + file + '\', \'' + title + '\')"]');
                    currentLink.classList.add('active');
                }
            };
            xhr.send();
        }

        // 切换导航栏收缩/展开
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var isCollapsed = sidebar.classList.contains('collapsed');
            sidebar.classList.toggle('collapsed');
            sidebar.classList.toggle('expanded');

            // 当菜单栏展开时，延迟显示文本直到过渡结束
            if (!isCollapsed) {
                var links = sidebar.querySelectorAll('a span');
                links.forEach(function(span) {
                    span.style.opacity = '0'; // 在收缩过程中隐藏文本
                    span.style.visibility = 'hidden'; // 同时隐藏文本
                    span.style.width = '0'; // 隐藏文本宽度以防止错位
                });
            }
        }

        // 监听展开动画结束，显示文本
        document.getElementById('sidebar').addEventListener('transitionend', function(e) {
            if (e.propertyName === 'width' && this.classList.contains('expanded')) {
                var links = this.querySelectorAll('a span');
                links.forEach(function(span) {
                    span.style.width = 'auto'; // 恢复文本宽度
                    span.style.opacity = '1'; // 在展开结束后显示文本
                    span.style.visibility = 'visible';
                });
            }
        });
    </script>

</body>
</html>
