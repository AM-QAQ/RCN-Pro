<h3 style="color: brown;">■使用方法</h3>


<p><i>★方法一（快速绑定）</i></p>
    
<p>
    1.
    在左侧菜单选择<b style="color:chocolate;">RCN-Pro->绑定</b>，
    确定“快速绑定/慢速绑定修改”为<b style="color:chocolate;">启用</b><br>
    <b style="color:chocolate;">点击保存</b>  
</p>
<div class="img-container">
    <img src="img/图片11.png" alt="图片加载失败">
</div>


<p>
    2.登录游戏，在IP地址栏输入Snewup
</p>
<div class="img-container">
    <img src="img/图片12.png" alt="图片加载失败">
</div>
     

<p><i>★方法二（慢速绑定）</i></p>
    
<p>
    1.
    在左侧菜单选择<b style="color:chocolate;">RCN-Pro->绑定</b>，
    确定“快速绑定/慢速绑定修改”为<b style="color:chocolate;">禁用</b><br>
    并复制下方<b style="color:chocolate;">慢速绑定码</b><br>
    <b style="color:chocolate;">点击保存</b>  
</p>
<div class="img-container">
    <img src="img/图片13.png" alt="图片加载失败">
</div>


<p>
    2.
    登录游戏在IP地址栏输入Snewup <br>
    在弹窗中输入所复制的<b style="color:chocolate;">慢速绑定码</b><br>
    显示绑定成功后再输入<b style="color:chocolate;">newup</b>
</p>
<div class="img-container">
    <img src="img/图片14.png" alt="图片加载失败">
</div>
<div class="img-container">
    <img src="img/图片15.png" alt="图片加载失败">
</div>
<div class="img-container">
    <img src="img/图片16.png" alt="图片加载失败">
</div>
<div class="img-container">
</div>
<p>
    注：慢速绑定最多绑定两个设备，若需要绑定新的设备请在
    <b style="color:chocolate;">RCN-Pro->绑定</b>
    删除无用的设备
</p>
